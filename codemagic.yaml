workflows:
  android-release:
    name: Build APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Find project and build
        script: |
          PROJECT=$(find . -type d -name "app" -exec test -e "{}/build.gradle" \; -print | head -1 | xargs dirname)
          echo "Building in $PROJECT"
          cd "$PROJECT"
          gradle assembleRelease
    artifacts:
      - "**/app/build/outputs/apk/release/*.apk"