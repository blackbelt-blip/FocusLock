workflows:
  android-release:
    name: Build APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: SHOW ME YOUR FILES
        script: |
          echo "=== ROOT ==="
          ls -la
          echo "=== FIND GRADLE FILES ==="
          find . -name "build.gradle" -o -name "settings.gradle" | head -20
          echo "=== FIND APP FOLDER ==="
          find . -type d -name "app"
      - name: Build
        script: |
          PROJECT=$(find . -name "settings.gradle" -exec dirname {} \; | head -1)
          cd "$PROJECT"
          gradle assembleRelease
    artifacts:
      - "**/app/build/outputs/apk/release/*.apk"