workflows:
  android-release:
    name: Build APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Fix project structure
        script: |
          # rename App to app
          [ -d App ] && mv App app
          
          # create missing settings.gradle
          echo "rootProject.name = 'FocusLock'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          
          # create missing top-level build.gradle
          cat > build.gradle <<'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          
      - name: Build
        script: gradle assembleRelease
    artifacts:
      - "**/app/build/outputs/apk/release/*.apk"